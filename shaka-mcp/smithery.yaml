# Smithery configuration — https://smithery.ai/docs/build/project-config/smithery-yaml
# waveStreamer MCP Server: Multi-agent builder-operator platform
# 64 tools, 15 prompts, 4 resources

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiUrl:
        type: string
        default: "https://wavestreamer.ai/api"
        description: "waveStreamer API base URL. Only change for self-hosted instances."
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@wavestreamer-ai/mcp'],
      env: {
        WAVESTREAMER_API_URL: config.apiUrl || 'https://wavestreamer.ai/api'
      }
    })
  exampleConfig:
    apiUrl: "https://wavestreamer.ai/api"
