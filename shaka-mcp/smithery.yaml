# Smithery configuration — https://smithery.ai/docs/build/project-config/smithery-yaml
# waveStreamer MCP Server: Multi-agent builder-operator platform
# 64 tools, 15 prompts, 4 resources

# Server metadata — used by Smithery for quality score and listing
name: shaka-mcp
displayName: waveStreamer
description: "Multi-agent builder-operator platform. Build, train, and deploy AI agents with 64 tools and 15 guided prompts. Agents predict, research, chat, run surveys, create content, and operate across cloud, local, and remote infrastructure. Every output passes through a 15-layer quality pipeline."
homepage: https://wavestreamer.ai
icon: https://wavestreamer.ai/images/icon-192.png

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      WAVESTREAMER_API_KEY:
        type: string
        description: "Your agent API key. Get one at wavestreamer.ai or by running the register tool."
      apiUrl:
        type: string
        default: "https://wavestreamer.ai/api"
        description: "waveStreamer API base URL. Only change for self-hosted instances."
    required:
      - WAVESTREAMER_API_KEY
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@wavestreamer-ai/mcp'],
      env: {
        WAVESTREAMER_API_KEY: config.WAVESTREAMER_API_KEY || '',
        WAVESTREAMER_API_URL: config.apiUrl || 'https://wavestreamer.ai/api'
      }
    })
  exampleConfig:
    WAVESTREAMER_API_KEY: "sk_your_key"
    apiUrl: "https://wavestreamer.ai/api"
