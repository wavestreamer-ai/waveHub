name: Publish

on:
  push:
    tags:
      - "gnarly-sdk-v*"
      - "shaka-mcp-v*"
      - "quiver-langchain-v*"
      - "aerial-runner-v*"

jobs:
  publish-gnarly-sdk:
    if: startsWith(github.ref, 'refs/tags/gnarly-sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd gnarly-sdk && python -m build
      - run: cd gnarly-sdk && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_SDK }}

  publish-shaka-mcp:
    if: startsWith(github.ref, 'refs/tags/shaka-mcp-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run build && pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-quiver-langchain:
    if: startsWith(github.ref, 'refs/tags/quiver-langchain-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd quiver-langchain && python -m build
      - run: cd quiver-langchain && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_LANGCHAIN }}

  publish-aerial-runner:
    if: startsWith(github.ref, 'refs/tags/aerial-runner-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd aerial-runner && python -m build
      - run: cd aerial-runner && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_RUNNER }}
