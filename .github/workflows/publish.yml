name: Publish

on:
  push:
    tags:
      - "gnarly-sdk-v*"
      - "shaka-mcp-v*"
      - "quiver-langchain-v*"
      - "aerial-runner-v*"
      - "wave-ts-v*"
      - "reef-crewai-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - gnarly-sdk
          - shaka-mcp
          - quiver-langchain
          - aerial-runner
          - wave-ts
          - reef-crewai
          - all

jobs:
  # ── Full test suite (must pass before any publish) ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Python
      - name: Install Python test deps
        run: pip install ruff pytest

      - name: Lint Python packages
        run: |
          cd gnarly-sdk && ruff check . && cd ..
          cd quiver-langchain && ruff check . && cd ..
          cd reef-crewai && ruff check . && cd ..
          cd aerial-runner && ruff check . && cd ..

      - name: Test gnarly-sdk
        run: |
          cd gnarly-sdk
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          if [ -d tests ]; then python -m pytest tests/ -v; fi

      - name: Test quiver-langchain
        run: |
          cd quiver-langchain
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          if [ -d tests ] && command -v pytest &>/dev/null; then python -m pytest tests/ -v; fi

      - name: Test reef-crewai
        run: |
          cd reef-crewai
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          if [ -d tests ] && command -v pytest &>/dev/null; then python -m pytest tests/ -v; fi

      # Node — MCP
      - name: Lint + build + test MCP
        run: |
          cd shaka-mcp
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run build
          pnpm run test

      # Node — TS SDK
      - name: Build TypeScript SDK
        run: |
          cd wave-ts
          pnpm install --frozen-lockfile
          pnpm run build

      # Version check
      - name: Check version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          MCP_JSON=$(node -e "console.log(require('./shaka-mcp/package.json').version)")
          TS_JSON=$(node -e "console.log(require('./wave-ts/package.json').version)")
          SDK_TOML=$(grep '^version' gnarly-sdk/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          FAIL=0
          for v in "$MCP_JSON" "$TS_JSON" "$SDK_TOML"; do
            if [ "$v" != "$VERSION" ]; then
              echo "ERROR: $v != $VERSION"
              FAIL=1
            fi
          done
          [ "$FAIL" = "0" ] && echo "All versions match: $VERSION"
          [ "$FAIL" = "1" ] && exit 1 || true

  # ── Publish: gnarly-sdk (PyPI) ──────────────────────────────────────────
  publish-gnarly-sdk:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/gnarly-sdk-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'gnarly-sdk' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd gnarly-sdk && python -m build
      - run: cd gnarly-sdk && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_SDK }}
      - name: Yank old PyPI versions
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          pip install requests
          python3 << 'PYEOF'
          import requests, os
          pkg = "wavestreamer-sdk"
          current = os.popen("cat VERSION | tr -d '[:space:]'").read().strip()
          token = os.environ.get("PYPI_TOKEN", "")
          r = requests.get(f"https://pypi.org/pypi/{pkg}/json")
          if r.ok:
              for ver in r.json().get("releases", {}):
                  if ver != current:
                      resp = requests.post(
                          f"https://pypi.org/manage/project/{pkg}/release/{ver}/yank/",
                          headers={"Authorization": f"token {token}"},
                          data={"yanked_reason": f"Outdated. Upgrade to {current}: pip install {pkg}"},
                      )
                      print(f"  Yank {pkg}@{ver}: {resp.status_code}")
          PYEOF
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN_SDK }}
        continue-on-error: true

  # ── Publish: shaka-mcp (npm) ────────────────────────────────────────────
  publish-shaka-mcp:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/shaka-mcp-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'shaka-mcp' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run build && pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Deprecate old npm versions
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          for ver in $(npm view @wavestreamer-ai/mcp versions --json 2>/dev/null | jq -r '.[]' 2>/dev/null); do
            if [ "$ver" != "$CURRENT" ]; then
              npm deprecate "@wavestreamer-ai/mcp@$ver" "Outdated. Upgrade to $CURRENT: npx @wavestreamer-ai/mcp" 2>/dev/null || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── Publish: quiver-langchain (PyPI) ────────────────────────────────────
  publish-quiver-langchain:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/quiver-langchain-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'quiver-langchain' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd quiver-langchain && python -m build
      - run: cd quiver-langchain && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_LANGCHAIN }}
      - name: Yank old PyPI versions
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, os
          pkg = "wavestreamer-langchain"
          current = os.popen("cat VERSION | tr -d '[:space:]'").read().strip()
          token = os.environ.get("PYPI_TOKEN", "")
          r = requests.get(f"https://pypi.org/pypi/{pkg}/json")
          if r.ok:
              for ver in r.json().get("releases", {}):
                  if ver != current:
                      resp = requests.post(
                          f"https://pypi.org/manage/project/{pkg}/release/{ver}/yank/",
                          headers={"Authorization": f"token {token}"},
                          data={"yanked_reason": f"Outdated. Upgrade to {current}: pip install {pkg}"},
                      )
                      print(f"  Yank {pkg}@{ver}: {resp.status_code}")
          PYEOF
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN_LANGCHAIN }}
        continue-on-error: true

  # ── Publish: aerial-runner (PyPI) ───────────────────────────────────────
  publish-aerial-runner:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/aerial-runner-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'aerial-runner' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd aerial-runner && python -m build
      - run: cd aerial-runner && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_RUNNER }}
      - name: Yank old PyPI versions
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, os
          pkg = "wavestreamer-runner"
          current = os.popen("cat VERSION | tr -d '[:space:]'").read().strip()
          token = os.environ.get("PYPI_TOKEN", "")
          r = requests.get(f"https://pypi.org/pypi/{pkg}/json")
          if r.ok:
              for ver in r.json().get("releases", {}):
                  if ver != current:
                      resp = requests.post(
                          f"https://pypi.org/manage/project/{pkg}/release/{ver}/yank/",
                          headers={"Authorization": f"token {token}"},
                          data={"yanked_reason": f"Outdated. Upgrade to {current}: pip install {pkg}"},
                      )
                      print(f"  Yank {pkg}@{ver}: {resp.status_code}")
          PYEOF
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN_RUNNER }}
        continue-on-error: true

  # ── Publish: wave-ts (npm) ──────────────────────────────────────────────
  publish-wave-ts:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/wave-ts-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'wave-ts' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd wave-ts && pnpm install --frozen-lockfile && pnpm run build && pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Deprecate old npm versions
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          for ver in $(npm view @wavestreamer-ai/sdk versions --json 2>/dev/null | jq -r '.[]' 2>/dev/null); do
            if [ "$ver" != "$CURRENT" ]; then
              npm deprecate "@wavestreamer-ai/sdk@$ver" "Outdated. Upgrade to $CURRENT: npm install @wavestreamer-ai/sdk" 2>/dev/null || true
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── Publish: reef-crewai (PyPI) ─────────────────────────────────────────
  publish-reef-crewai:
    needs: test
    if: >
      startsWith(github.ref, 'refs/tags/reef-crewai-v') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'reef-crewai' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: cd reef-crewai && python -m build
      - run: cd reef-crewai && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_CREWAI }}
      - name: Yank old PyPI versions
        run: |
          pip install requests
          python3 << 'PYEOF'
          import requests, os
          pkg = "wavestreamer-crewai"
          current = os.popen("cat VERSION | tr -d '[:space:]'").read().strip()
          token = os.environ.get("PYPI_TOKEN", "")
          r = requests.get(f"https://pypi.org/pypi/{pkg}/json")
          if r.ok:
              for ver in r.json().get("releases", {}):
                  if ver != current:
                      resp = requests.post(
                          f"https://pypi.org/manage/project/{pkg}/release/{ver}/yank/",
                          headers={"Authorization": f"token {token}"},
                          data={"yanked_reason": f"Outdated. Upgrade to {current}: pip install {pkg}"},
                      )
                      print(f"  Yank {pkg}@{ver}: {resp.status_code}")
          PYEOF
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN_CREWAI }}
        continue-on-error: true

  # ── Post-publish: install verification ───────────────────────────────────
  verify-install:
    needs:
      - publish-gnarly-sdk
      - publish-shaka-mcp
      - publish-quiver-langchain
      - publish-aerial-runner
      - publish-wave-ts
      - publish-reef-crewai
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Wait for registry propagation
        run: sleep 30

      - name: Verify npm packages install and import
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')

          echo "--- Verifying @wavestreamer-ai/mcp@${VERSION} ---"
          npm install -g @wavestreamer-ai/mcp@${VERSION}
          node -e "
            const pkg = require('@wavestreamer-ai/mcp/package.json');
            console.log('  Installed:', pkg.name, pkg.version);
            if (pkg.version !== '${VERSION}') { process.exit(1); }
          " || echo "::warning::MCP install verification failed"

          echo "--- Verifying @wavestreamer-ai/sdk@${VERSION} ---"
          mkdir -p /tmp/ts-verify && cd /tmp/ts-verify
          pnpm init && pnpm add @wavestreamer-ai/sdk@${VERSION}
          node -e "
            const pkg = require('@wavestreamer-ai/sdk/package.json');
            console.log('  Installed:', pkg.name, pkg.version);
            if (pkg.version !== '${VERSION}') { process.exit(1); }
          " || echo "::warning::TS SDK install verification failed"

      - name: Verify PyPI packages install and import
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')

          echo "--- Verifying wavestreamer-sdk==${VERSION} ---"
          pip install wavestreamer-sdk==${VERSION}
          python3 -c "
          import wavestreamer
          print('  Installed:', wavestreamer.__version__)
          assert wavestreamer.__version__ == '${VERSION}', f'Version mismatch: {wavestreamer.__version__}'
          # Verify core classes are importable
          from wavestreamer import WaveStreamer
          print('  WaveStreamer class: OK')
          " || echo "::warning::SDK install verification failed"

          echo "--- Verifying wavestreamer-langchain==${VERSION} ---"
          pip install wavestreamer-langchain==${VERSION}
          python3 -c "
          from langchain_wavestreamer import WaveStreamerToolkit
          print('  WaveStreamerToolkit: OK')
          " || echo "::warning::LangChain install verification failed"

          echo "--- Verifying wavestreamer-runner==${VERSION} ---"
          pip install wavestreamer-runner==${VERSION}
          python3 -c "
          from wavestreamer_runner import WaveStreamerRunner
          print('  WaveStreamerRunner: OK')
          " || echo "::warning::Runner install verification failed"

          echo "--- Verifying wavestreamer-crewai==${VERSION} ---"
          pip install wavestreamer-crewai==${VERSION}
          python3 -c "
          from crewai_wavestreamer import WaveStreamerToolkit
          print('  CrewAI WaveStreamerToolkit: OK')
          " || echo "::warning::CrewAI install verification failed"

  # ── Post-publish: MCP smoke test ───────────────────────────────────────
  mcp-smoke-test:
    needs: publish-shaka-mcp
    if: >
      needs.publish-shaka-mcp.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Wait for npm propagation
        run: sleep 20

      - name: Install published MCP and smoke test
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          npm install -g @wavestreamer-ai/mcp@${VERSION}

          # Start MCP in background, send initialize request, check it responds
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke-test","version":"1.0.0"}}}' > /tmp/mcp-init.json

          # Run MCP via stdio — send init, capture response, timeout after 10s
          RESPONSE=$(timeout 15 bash -c 'cat /tmp/mcp-init.json | wavestreamer-mcp 2>/dev/null | head -1' || true)

          if echo "$RESPONSE" | grep -q '"serverInfo"'; then
            echo "MCP server responded to initialize"

            # Extract tool count from capabilities
            TOOL_COUNT=$(echo "$RESPONSE" | node -e "
              let data = '';
              process.stdin.on('data', d => data += d);
              process.stdin.on('end', () => {
                try {
                  const r = JSON.parse(data);
                  console.log(r.result?.capabilities ? 'capabilities_ok' : 'no_capabilities');
                } catch { console.log('parse_error'); }
              });
            ")
            echo "  Capabilities check: $TOOL_COUNT"
          else
            echo "::warning::MCP server did not respond to initialize request"
            echo "  Response: $RESPONSE"
          fi

      - name: Verify tool count via list
        run: |
          # Send tools/list request
          cat << 'JSONRPC' > /tmp/mcp-tools.jsonl
          {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke-test","version":"1.0.0"}}}
          {"jsonrpc":"2.0","id":2,"method":"notifications/initialized"}
          {"jsonrpc":"2.0","id":3,"method":"tools/list"}
          JSONRPC

          TOOLS_RESPONSE=$(timeout 15 bash -c 'cat /tmp/mcp-tools.jsonl | wavestreamer-mcp 2>/dev/null | tail -1' || true)

          if [ -n "$TOOLS_RESPONSE" ]; then
            TOOL_COUNT=$(echo "$TOOLS_RESPONSE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try { const r=JSON.parse(d); console.log((r.result?.tools||[]).length); }
                catch { console.log(0); }
              });
            ")
            echo "Tools registered: $TOOL_COUNT"
            if [ "$TOOL_COUNT" -ge 60 ]; then
              echo "Tool count check passed (>= 60)"
            else
              echo "::error::Expected >= 60 tools, got $TOOL_COUNT"
              exit 1
            fi
          else
            echo "::warning::Could not get tools list from MCP server"
          fi

  # ── GitHub Release (after all publishes) ────────────────────────────────
  create-release:
    needs:
      - publish-gnarly-sdk
      - publish-shaka-mcp
      - publish-quiver-langchain
      - publish-aerial-runner
      - publish-wave-ts
      - publish-reef-crewai
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')

          # Collect which packages were published
          BODY="## Published packages at v${VERSION}\n\n"
          BODY+="| Package | Registry | Install |\n"
          BODY+="|---------|----------|---------|\n"
          BODY+="| \`@wavestreamer-ai/mcp\` | npm | \`npx @wavestreamer-ai/mcp\` |\n"
          BODY+="| \`@wavestreamer-ai/sdk\` | npm | \`npm install @wavestreamer-ai/sdk\` |\n"
          BODY+="| \`wavestreamer-sdk\` | PyPI | \`pip install wavestreamer-sdk\` |\n"
          BODY+="| \`wavestreamer-langchain\` | PyPI | \`pip install wavestreamer-langchain\` |\n"
          BODY+="| \`wavestreamer-runner\` | PyPI | \`pip install wavestreamer-runner\` |\n"
          BODY+="| \`wavestreamer-crewai\` | PyPI | \`pip install wavestreamer-crewai\` |\n"
          BODY+="\nSee [CHANGELOG.md](CHANGELOG.md) for details."

          # Create release (skip if it already exists)
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$(echo -e "$BODY")" \
            --latest \
            2>/dev/null || echo "Release v${VERSION} already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
