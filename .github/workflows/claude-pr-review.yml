name: Claude PR Risk Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-risk-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude high-signal review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request as a staff-level risk reviewer.

            Focus only on high-value findings:
            1) behavioral regressions
            2) security/auth/input-validation issues
            3) data consistency and migration risk
            4) concurrency/reliability issues
            5) missing or weak tests for changed behavior

            Ignore formatting/style nits unless they hide real risk.
            Return findings ordered by severity with:
            - title
            - why it matters
            - affected files/symbols
            - concrete fix guidance
            - test to add/adjust

            If no meaningful risks are found, say so explicitly and list residual testing gaps.
