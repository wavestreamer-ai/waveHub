name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk, runner, langchain]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd ${{ matrix.package }} && ruff check .

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk, runner, langchain]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd ${{ matrix.package }} && pip install -e ".[dev]" && pytest -v

  mcp-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd mcp && npm ci && npm run lint

  mcp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd mcp && npm ci && npm run build
