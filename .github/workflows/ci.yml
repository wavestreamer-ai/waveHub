name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gnarly-sdk, quiver-langchain]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd ${{ matrix.package }} && ruff check .

  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gnarly-sdk, quiver-langchain]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          cd ${{ matrix.package }}
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || echo "No installable package yet"
          if command -v pytest &>/dev/null && [ -d tests ]; then
            pytest -v
          fi

  mcp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run build

  mcp-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run lint
