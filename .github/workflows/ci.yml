name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Version consistency ─────────────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"

          SDK_TOML=$(grep '^version' gnarly-sdk/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          SDK_INIT=$(grep '__version__' gnarly-sdk/wavestreamer/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')
          MCP_JSON=$(node -e "console.log(require('./shaka-mcp/package.json').version)")
          LC_TOML=$(grep '^version' quiver-langchain/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          RUNNER_TOML=$(grep '^version' aerial-runner/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TS_JSON=$(node -e "console.log(require('./wave-ts/package.json').version)")
          CREWAI_TOML=$(grep '^version' reef-crewai/pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          echo "  gnarly-sdk pyproject.toml: $SDK_TOML"
          echo "  gnarly-sdk __init__.py:    $SDK_INIT"
          echo "  shaka-mcp package.json:    $MCP_JSON"
          echo "  quiver-langchain:          $LC_TOML"
          echo "  aerial-runner:             $RUNNER_TOML"
          echo "  wave-ts package.json:      $TS_JSON"
          echo "  reef-crewai:               $CREWAI_TOML"

          FAIL=0
          for v in "$SDK_TOML" "$SDK_INIT" "$MCP_JSON" "$LC_TOML" "$RUNNER_TOML" "$TS_JSON" "$CREWAI_TOML"; do
            if [ "$v" != "$VERSION" ]; then
              echo "ERROR: Version mismatch — $v != $VERSION"
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo "Run: make sync-versions"
            exit 1
          fi
          echo "All versions match"

  # ── Python lint (matrix) ────────────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gnarly-sdk, quiver-langchain, reef-crewai, aerial-runner]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd ${{ matrix.package }} && ruff check .

  # ── Python test (matrix) ────────────────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [gnarly-sdk, quiver-langchain, reef-crewai]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          cd ${{ matrix.package }}
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || echo "No installable package"
          if command -v pytest &>/dev/null && [ -d tests ]; then
            pytest -v
          else
            echo "No tests to run"
          fi

  # ── MCP: lint + build + test ────────────────────────────────────────────
  mcp-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run lint

  mcp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run build

  mcp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd shaka-mcp && pnpm install --frozen-lockfile && pnpm run build && pnpm run test

  # ── TypeScript SDK: build ───────────────────────────────────────────────
  ts-sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: cd wave-ts && pnpm install --frozen-lockfile && pnpm run build
